name: Refresh Savant Data

on:
  schedule:
    - cron: '0 6 * * *'  # 2am ET (6am UTC)
  workflow_dispatch:       # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Refresh Savant data (2024-2026)
        run: node scripts/refresh-savant-data.mjs --years=2024,2025,2026

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/savant_data.json src/pitcher_savant_data.json src/baserunning_data.json src/pitch_arsenal_data.json
          git diff --cached --quiet || git commit -m "Refresh Savant data $(date -u +%Y-%m-%d)"
          git push
