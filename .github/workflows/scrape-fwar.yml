name: Scrape fWAR Leaderboard

on:
  schedule:
    - cron: '0 6 * * *'  # 2am ET (6am UTC)
  workflow_dispatch:       # manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install chromium --with-deps

      - name: Scrape FanGraphs leaderboard
        env:
          CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
        run: xvfb-run --auto-servernum node scripts/scrape-fwar.mjs

      - name: Commit updated leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/live_leaderboard.json
          git diff --cached --quiet || git commit -m "Update live fWAR leaderboard $(date -u +%Y-%m-%d)"
          git push
